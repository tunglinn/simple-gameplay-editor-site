// ════════════════════════════════════════════════════
//  WEBCODECS VIDEO EXPORT
// ════════════════════════════════════════════════════
let cancelExport = false;

async function doWebCodecsExport() {
  // WebCodecs is a low-level browser API for encoding/decoding video and audio.
  // It gives direct access to the hardware codec (GPU) rather than going through
  // the browser's high-level video element. Only available in Chrome/Edge.
  if (!('VideoEncoder' in window) || !('VideoDecoder' in window)) {
    toast('WebCodecs not supported — use Chrome or Edge');
    return;
  }
  // Only export clips that are fully bounded (have both a start AND end time).
  // Sort chronologically so clips are concatenated in playback order.
  const exportClips = clips.filter(c => c.end !== null).sort((a,b) => a.start - b.start);
  if (!exportClips.length) { toast('No complete clips to export'); return; }
  if (!videoFile) { toast('No video loaded'); return; }

  cancelExport = false;

  $('export-body').innerHTML = `<div class="export-body">
    <div class="exp-progress">
      <div class="exp-status" id="exp-status">Initializing…</div>
      <div class="exp-bar-wrap"><div class="exp-bar" id="exp-bar"></div></div>
      <div class="exp-meta-txt" id="exp-meta"></div>
      <button class="exp-cancel" id="exp-cancel-btn" onclick="cancelExportFn()">Cancel</button>
    </div>
  </div>`;

  const setProgress = (pct, status, meta = '') => {
    const bar = $('exp-bar'), lbl = $('exp-status'), met = $('exp-meta');
    if (bar) bar.style.width = Math.max(0, pct) + '%';
    if (lbl) lbl.textContent = status;
    if (met) met.textContent = meta;
  };

  const homeLabel = $('inp-home').value || 'Home';
  const awayLabel = $('inp-away').value || 'Away';

  try {
    setProgress(2, 'Loading muxer…');
    // A muxer (multiplexer) combines multiple media streams into one container file.
    // Think of MP4 as a ZIP file: the muxer is the tool that packs the encoded video
    // chunks and encoded audio chunks together, writing the MP4 file structure
    // (track headers, timing tables, codec metadata, etc.) around them.
    // mp4-muxer is a pure-JS library that does this entirely in the browser.
    let Muxer, ArrayBufferTarget;
    try {
      ({ Muxer, ArrayBufferTarget } = await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/+esm'));
    } catch {
      throw new Error('Could not load mp4-muxer. Check your internet connection.');
    }
    if (cancelExport) return;

    // Read the entire video file into memory as a raw byte array (ArrayBuffer).
    // This is needed because MP4Box.js (the parser below) operates on raw bytes.
    // ⚠ WARNING (memory): keeps the full video file in RAM alongside the output
    // buffer and decoded frame buffers — can exhaust memory on large files.
    setProgress(5, 'Reading video file…', wcFmtSize(videoFile.size));
    const fileBuffer = await videoFile.arrayBuffer();
    if (cancelExport) return;

    // MP4 is a "container format" — it is a wrapper (like a ZIP) that holds
    // separate compressed video and audio streams inside "tracks".
    // wcParseMp4 uses MP4Box.js to read the container structure and extract
    // every compressed frame ("sample") from each track into plain arrays.
    // videoTrack / audioTrack: metadata about each stream (dimensions, fps, codec).
    // videoSamples / audioSamples: the actual compressed data, one entry per frame.
    // mp4file: the live MP4Box object, needed later to read the codec config.
    setProgress(9, 'Parsing container…');
    const { videoTrack, audioTrack, videoSamples, audioSamples, mp4file } =
      await wcParseMp4(fileBuffer);
    if (cancelExport) return;
    if (!videoTrack) throw new Error('No video track found in file');

    const { width, height } = videoTrack.video;
    // Timescale: the number of "ticks" per second used to express timestamps in the file.
    // Example: timescale=90000 means a frame at t=1s has timestamp=90000.
    // To convert any MP4 timestamp to seconds: seconds = timestamp / timescale.
    const timescale = videoTrack.timescale;
    // Estimate frame rate: total frames ÷ total duration (converted to seconds).
    // nb_samples = total frame count in the video track.
    // ⚠ WARNING: Math.round turns 29.97 fps into 30 fps. This ~0.1% mismatch
    // between the encoder's declared fps and the real frame spacing causes
    // slight A/V sync drift on long exports.
    const fps = Math.round(videoTrack.nb_samples / (videoTrack.duration / timescale));

    setProgress(11, 'Preparing…', `${width}×${height} · ${fps} fps · ${exportClips.length} clip${exportClips.length !== 1 ? 's' : ''}`);
    await wcYield();

    // For each clip, collect the set of compressed video samples that cover it.
    // This includes some samples BEFORE clip.start as "pre-roll" — because
    // H.264 frames often reference earlier frames (they are not self-contained),
    // so the decoder needs to process those earlier frames first to reconstruct
    // the ones we actually want. wcGetSamplesForClip finds the last keyframe
    // before clip.start and starts there, giving the decoder its necessary context.
    const clipGroups = exportClips.map(c => wcGetSamplesForClip(videoSamples, c, timescale));
    // frameSamples = samples within the clip's display window (used for progress only).
    // ⚠ WARNING: frameSamples has no upper-bound check in wcGetSamplesForClip,
    // so totalFrames is slightly overestimated — the progress bar won't reach 91%.
    const totalFrames = clipGroups.reduce((n, g) => n + g.frameSamples.length, 0);
    if (!totalFrames) throw new Error('No frames found in the selected clip ranges');

    // OffscreenCanvas: a canvas element that lives only in memory, not on the page.
    // We use it to composite each decoded video frame with the scoreboard overlay
    // before passing the combined image to the encoder.
    const canvas = new OffscreenCanvas(width, height);
    const ctx = canvas.getContext('2d');

    // Configure the muxer with our output tracks and memory target.
    // ArrayBufferTarget: accumulates all muxed bytes into a RAM buffer.
    //   Call muxer.target.buffer after finalize() to get the complete MP4 bytes.
    // fastStart 'in-memory': moves the MP4 metadata (moov box) to the start of
    //   the file so media players can begin playback immediately without seeking
    //   to the end first. The in-memory variant buffers everything then reorders.
    // firstTimestampBehavior 'offset': subtracts the first frame's timestamp from
    //   all subsequent timestamps, ensuring the output video always starts at t=0.
    const muxer = new Muxer({
      target: new ArrayBufferTarget(),
      // 'avc' = H.264/AVC (Advanced Video Coding) — the most widely supported
      // video codec. Each compressed frame is a fragment of H.264 bitstream.
      video: { codec: 'avc', width, height },
      // AAC = Advanced Audio Coding — the standard audio codec inside MP4 files.
      ...(audioTrack ? { audio: {
        codec: 'aac',
        sampleRate: audioTrack.audio.sample_rate,
        numberOfChannels: audioTrack.audio.channel_count,
      }} : {}),
      fastStart: 'in-memory',
      firstTimestampBehavior: 'offset',
    });

    let encErr = null;
    let encErrClip = -1;
    // VideoEncoder compresses raw image frames (VideoFrame objects) into
    // H.264 bitstream chunks. Each output chunk is handed to the muxer immediately.
    const encoder = new VideoEncoder({
      output: (chunk, meta) => { if (!cancelExport) muxer.addVideoChunk(chunk, meta); },
      error: e => {
        encErr = e;
        console.error('[WC] ENCODER ERROR at clip', encErrClip, '—', e.name, e.message, e);
      },
    });
    // wcPickH264Codec (defined below) selects the minimum H.264 level that can
    // handle this video's resolution and frame rate. H.264 levels cap the maximum
    // macroblocks-per-second (MBs/sec) a decoder or encoder must handle, where each
    // macroblock covers 16×16 pixels. Choosing too low a level makes the encoder
    // reject or corrupt frames:
    //   Level 4.0 (avc1.640028) — up to ~245 760 MBs/sec → 1080p @ 30 fps
    //   Level 5.0 (avc1.640032) — up to ~589 824 MBs/sec → ~1440p @ 30 fps
    //   Level 5.1 (avc1.640033) — up to ~983 040 MBs/sec → 4K @ 30 fps
    encoder.configure({
      codec: wcPickH264Codec(width, height, fps),
      width, height,
      bitrate: getExportBitrate(width, height, fps),
      framerate: fps,
      // 'prefer-hardware' uses the GPU for encoding, which is 10–100x faster than
      // the CPU. If hardware acceleration isn't available, it falls back to software.
      hardwareAcceleration: 'prefer-hardware',
      // 'realtime' outputs each encoded chunk immediately instead of buffering
      // many frames for look-ahead analysis ('quality' mode). This keeps the
      // encode queue small and prevents GPU memory exhaustion across clips.
      latencyMode: 'realtime',
    });

    // Why we must decode then re-encode even though the source is already H.264:
    // We need to draw the scoreboard overlay onto every frame. There is no way to
    // "insert pixels" into a compressed video stream — compressed frames store only
    // differences and mathematical coefficients, not raw pixels. The only path is:
    // decompress → draw on canvas → compress again. This is why the export is slow
    // compared to copying audio, which has no visual modification at all.
    //
    // Build the VideoDecoder configuration from codec metadata stored in the MP4.
    // H.264 streams require SPS (Sequence Parameter Set) and PPS (Picture Parameter
    // Set) NAL units to be provided up-front. These describe the stream's profile,
    // resolution, and encoding settings. Without them the decoder cannot start.
    // wcBuildDecoderConfig reads them from the avcC box in the MP4 container.
    const decoderConfig = wcBuildDecoderConfig(videoTrack, mp4file);
    if (!decoderConfig.description) {
      // description is the raw AVCDecoderConfigurationRecord or
      // HEVCDecoderConfigurationRecord bytes that tell the decoder about the
      // stream's profile, resolution, and parameter sets (SPS/PPS/VPS).
      // If it's missing here, wcBuildDecoderConfig could not find a recognised
      // codec config box — either the file uses AV1, VP9, or a codec whose
      // container structure we don't yet handle.
      const codec = videoTrack.codec || '';
      if (codec.startsWith('av01')) {
        throw new Error('AV1 video is not supported by the WebCodecs export engine — convert the file to H.264 or H.265 first.');
      }
      throw new Error('Could not read codec config from video. H.264 (AVC) and H.265 (HEVC) files are supported. If the file is HEVC and this still fails, try the MediaRecorder engine.');
    }

    console.log('[WC] source codec:', videoTrack.codec, `${width}×${height}`, fps + 'fps',
      videoSamples.length + ' samples', 'decoderConfig:', decoderConfig);

    let framesEncoded = 0;
    // Tracks the total output duration placed so far so each new clip is appended
    // immediately after the previous one with no gap.
    let cumulativeDuration = 0;

    for (let ci = 0; ci < clipGroups.length; ci++) {
      if (cancelExport) break;
      encErrClip = ci;
      const { clip, allSamples, frameSamples } = clipGroups[ci];
      console.log(`[WC] clip ${ci}: ${clip.start.toFixed(3)}–${clip.end.toFixed(3)}s, ${allSamples.length} samples`);

      // DTS (Decode Time Stamp): the order in which the decoder must process frames.
      // CTS (Composition Time Stamp): the order in which frames should be displayed.
      // These differ when the video uses B-frames (Bidirectional frames).
      //
      // B-frames compress a frame by storing only its difference from BOTH a past
      // and a future frame. This means frame display order ≠ decode order.
      // Example stream (I=keyframe, P=predicted from past, B=bidirectional):
      //   Display order:  I  B  B  P  B  B  P
      //   Decode order:   I  P  B  B  P  B  B   ← B-frames decoded after their references
      //
      // The decoder's output callback gives us the DTS. We need CTS to know when
      // each frame is actually displayed, which is what clip.start/end refers to.
      const dtsToCts = new Map();
      for (const s of allSamples) {
        const ts = s.timescale || timescale;
        dtsToCts.set(Math.round(s.dts * 1_000_000 / ts),
                     Math.round(s.cts * 1_000_000 / ts));
      }
      // The WebCodecs spec requires decoders to echo back the exact timestamp
      // passed in, but some implementations round differently. The ±2 µs loop
      // handles that drift without falling back to the wrong DTS value.
      const lookupCts = dts => {
        for (const d of [0, 1, -1, 2, -2]) {
          const v = dtsToCts.get(dts + d);
          if (v !== undefined) return v;
        }
        return dts; // last resort: treat DTS as CTS (no B-frame offset)
      };

      // firstOfClip forces the first encoded frame of each clip to be a keyframe
      // (also called an I-frame — Intra-coded frame).
      // A keyframe is a complete, fully self-contained image. All other frame types
      // (P-frames, B-frames) store only differences from other frames and CANNOT
      // be decoded without prior context. At each clip boundary the concatenated
      // video must start fresh, so a keyframe is mandatory here.
      let firstOfClip = true;

      // Each clip gets its own fresh VideoDecoder so there is no leftover state
      // (reference frames, B-frame buffers) carried over from the previous clip.
      // Processing happens inside the output callback: we decode → draw to canvas
      // → overlay scoreboard → encode → close frame, all inline without buffering.
      // Buffering decoded frames would exhaust GPU memory (~8 MB per 1080p frame).
      const decoder = new VideoDecoder({
        output: async (frame) => {
          // NOTE: this callback is async so we can await createImageBitmap (see below).
          // JavaScript is single-threaded, so "concurrent" callbacks are really
          // interleaved at await points — not truly parallel. The key invariant to
          // preserve is firstOfClip: we must read and reset it before the first
          // await, otherwise a second frame's callback could start during our await
          // and both would wrongly see firstOfClip=true, emitting two keyframes.
          // We solve this by reading+resetting firstOfClip synchronously here, before
          // any await, and only for frames that are actually inside the clip window.
          try {
            // Translate the decoder's DTS-based timestamp to display time (CTS).
            const ctsMicros = lookupCts(frame.timestamp);
            const ctsSec    = ctsMicros / 1_000_000;

            // Only process frames within the clip's display window.
            // Frames before clip.start are pre-roll: the decoder needed them to
            // build up its reference frame buffer, but we don't want them in output.
            //
            // Why ±0.002 s (2 ms) tolerance?
            // The clip boundaries (clip.start, clip.end) are floating-point seconds.
            // The frame's CTS is computed by dividing an integer timestamp by a
            // timescale integer, which introduces small rounding errors. A frame
            // intended to land exactly at clip.start might come out as
            // clip.start + 0.00011 s and get excluded without this tolerance.
            // 2 ms is much less than one frame (≈33 ms at 30fps), so it can't
            // accidentally pull in frames from outside the intended range.
            if (ctsSec >= clip.start - 0.002 && ctsSec <= clip.end + 0.002
                && !cancelExport && !encErr) {

              // Capture and reset firstOfClip synchronously before the first await.
              // If we awaited first, another frame callback could run in the gap and
              // also see firstOfClip=true, causing two keyframes at the clip start.
              const keyFrame = firstOfClip;
              firstOfClip = false;

              // Map the frame's original timestamp to its position in the output video.
              // (ctsSec - clip.start)  = how far into this clip this frame is (seconds)
              // + cumulativeDuration   = total duration of all previously exported clips
              const outTs = Math.round(((ctsSec - clip.start) + cumulativeDuration) * 1_000_000);

              // Hardware-decoded VideoFrames on Android are stored in a GPU-resident
              // YUV texture (produced by MediaCodec, the Android hardware codec).
              // Calling ctx.drawImage(frame) directly on a 2D OffscreenCanvas performs
              // a GPU→CPU readback that fails silently on Android Chrome — the canvas
              // receives nothing and stays black, making every exported frame black.
              //
              // createImageBitmap routes the conversion through the browser's full
              // image compositing pipeline, which correctly handles GPU textures on
              // every platform. The result is a CPU-accessible RGBA ImageBitmap that
              // the 2D canvas can draw without any readback issues.
              //
              // On desktop Chrome the direct ctx.drawImage(frame) path also works
              // because the compositor there handles the transfer, but using
              // createImageBitmap is correct on all platforms so we do it always.
              const bitmap = await createImageBitmap(frame);
              ctx.drawImage(bitmap, 0, 0, width, height);
              bitmap.close();

              // wcScoreAt scans the global `clips` array to count home_point and
              // away_point entries whose end time is ≤ ctsSec (original timeline).
              // This gives the running score at this exact moment in the game,
              // which is correct even for clips exported out of their original context.
              const { h, a } = wcScoreAt(ctsSec);
              wcDrawScoreboard(ctx, width, height, homeLabel, awayLabel, h, a);

              // Wrap the canvas pixels in a VideoFrame for the encoder.
              // VideoFrame is the uncompressed image representation (raw pixel data).
              const vf = new VideoFrame(canvas, { timestamp: outTs });
              try {
                encoder.encode(vf, { keyFrame });
              } catch (syncErr) {
                console.error('[WC] encoder.encode() threw synchronously:', syncErr.name, syncErr.message, 'outTs:', outTs, 'keyFrame:', keyFrame);
                encErr = syncErr;
              }
              vf.close(); // Release GPU/memory immediately; encoder has its own copy.
              framesEncoded++;
            }
          } catch (e) {
            if (!encErr) { encErr = e; console.error('[WC] frame processing error:', e.name, e.message); }
          } finally {
            // ALWAYS close the decoded frame, even pre-roll frames we don't use.
            // Decoded frames hold GPU-allocated memory. Forgetting to close them
            // will exhaust GPU memory and cause the decoder pipeline to stall.
            frame.close();
          }
        },
        error: e => {
          encErr = e;
          console.error('[WC] DECODER ERROR at clip', ci, '—', e.name, e.message, e);
        },
      });
      decoder.configure(decoderConfig);

      for (let si = 0; si < allSamples.length; si++) {
        if (encErr || decoder.state === 'closed') break;
        const s  = allSamples[si];
        const ts = s.timescale || timescale;
        // Feed a single compressed frame ("sample") to the decoder.
        // is_sync = true → keyframe (I-frame); false → P-frame or B-frame ("delta").
        // Timestamps are in microseconds; dts = decode order, duration = frame length.
        // The decoder queues this and calls output() asynchronously when ready.
        decoder.decode(new EncodedVideoChunk({
          type:      s.is_sync ? 'key' : 'delta',
          timestamp: Math.round(s.dts * 1_000_000 / ts),
          duration:  Math.round(s.duration * 1_000_000 / ts),
          data:      s.data,
        }));
        // JavaScript is single-threaded. While we're in this synchronous loop,
        // no callbacks (including the decoder's output()) can fire. Yielding every
        // 50 samples hands control back to the browser for one tick, letting the
        // decoder drain its output queue and free GPU memory incrementally.
        // 50 samples ≈ 1.7 s of video at 30fps — frequent enough to keep memory
        // low without thrashing the event loop with constant yields.
        if ((si + 1) % 50 === 0) {
          await wcYield();
          console.log(`[WC] clip ${ci} sample ${si}: framesEncoded=${framesEncoded} encodeQueueSize=${encoder.encodeQueueSize} decodeQueueSize=${decoder.decodeQueueSize}`);
          const pct = 11 + Math.round((framesEncoded / totalFrames) * 80);
          setProgress(pct,
            `Encoding frame ${framesEncoded} / ${totalFrames}`,
            `Clip ${ci + 1} / ${exportClips.length}`);
        }
      }

      if (encErr) throw encErr;
      // flush() signals "no more input" to the decoder and waits until it has
      // emitted all remaining output frames (including buffered B-frames).
      // Three-way race: normal completion, 20 s stall timeout, or user cancel.
      // The cancel leg polls every 50 ms — frequent enough that cancel feels instant
      // to the user, but not so frequent (e.g. 1 ms) that it burns CPU in the loop.
      // It resolves (not rejects) so the try block falls through to decoder.close()
      // cleanly rather than jumping to the catch block.
      if (decoder.state !== 'closed') {
        let stallTimer, cancelPoll;
        try {
          await Promise.race([
            decoder.flush(),
            new Promise((_, rej) => { stallTimer = setTimeout(() =>
              rej(new Error('Decoder stalled — try a different video file')), 20_000); }),
            new Promise(res => { cancelPoll = setInterval(() => {
              if (cancelExport) { clearInterval(cancelPoll); res(); }
            }, 50); }),
          ]);
        } finally {
          clearTimeout(stallTimer);
          clearInterval(cancelPoll);
        }
      }
      decoder.close();

      // Flush the encoder after each clip so all buffered frames are compressed
      // and released from GPU memory before the next clip's decoder starts.
      // Without this, frames pile up across clips and exhaust GPU memory.
      // Skip on the last clip — the flush after the loop handles that.
      if (ci < clipGroups.length - 1 && !cancelExport && !encErr) {
        console.log(`[WC] flushing encoder after clip ${ci}, queue was:`, encoder.encodeQueueSize);
        await encoder.flush();
        console.log(`[WC] encoder flushed, queue now:`, encoder.encodeQueueSize);
      }

      cumulativeDuration += clip.end - clip.start;
    }

    if (cancelExport) return;
    if (encErr) throw encErr;

    // Tell the encoder there are no more frames. It drains any internally buffered
    // frames, calling output() for each, before the promise resolves.
    setProgress(93, 'Flushing encoder…');
    await encoder.flush();
    encoder.close();

    // Audio: direct copy — AAC frames from the source are muxed as-is.
    // We don't need to decode and re-encode audio because we're not changing it
    // (no overlay, no pitch shift, nothing). Unlike video frames, which store
    // differences between frames and need full decompression to modify, AAC audio
    // frames are completely self-contained — each one holds a full 21 ms snapshot
    // of audio that can be read and written independently of any other frame.
    // This is why every frame is marked type: 'key': there is no such thing as
    // an audio "P-frame" or "B-frame." Copying them directly costs almost no time.
    // ⚠ NOTE: Because AAC frames are ~21 ms wide, the nearest frame boundary may
    // not align exactly to clip.start/end, causing a small click or gap at each cut.
    if (audioTrack && audioSamples.length) {
      setProgress(95, 'Muxing audio…');
      const aTs = audioTrack.timescale;
      let audioCumulative = 0;
      for (const clip of exportClips) {
        const clipAudio = audioSamples.filter(s => {
          const t = s.cts / (s.timescale || aTs);
          return t >= clip.start - 0.002 && t <= clip.end + 0.002;
        });
        for (const s of clipAudio) {
          const t = s.cts / (s.timescale || aTs);
          // The ±0.002 s filter above can include a sample that starts just before
          // clip.start. On the first clip (audioCumulative=0) that makes outTs
          // slightly negative, which the muxer rejects. Clamp to 0.
          const outTs = Math.max(0, Math.round(((t - clip.start) + audioCumulative) * 1_000_000));
          // duration: how long this audio frame lasts, in microseconds.
          // s.duration is in timescale units, so we convert the same way we do for video.
          const outDur = Math.max(1, Math.round(s.duration * 1_000_000 / (s.timescale || aTs)));
          muxer.addAudioChunk(new EncodedAudioChunk({ type: 'key', timestamp: outTs, duration: outDur, data: s.data }), null);
        }
        audioCumulative += clip.end - clip.start;
      }
    }

    // finalize() instructs the muxer to write all MP4 structural metadata
    // (moov box, track headers, sample tables, stts/ctts timing tables, etc.)
    // and produce the final byte sequence in muxer.target.buffer.
    // finalize() is synchronous and can block the thread for a moment on large files.
    // The wcYield() before it gives the browser one tick to render the "Finalizing"
    // progress message before that block happens, so the UI doesn't appear frozen.
    setProgress(98, 'Finalizing MP4…');
    await wcYield();
    muxer.finalize();

    const outBuffer = muxer.target.buffer;
    const blob = new Blob([outBuffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const date = new Date().toISOString().slice(0, 10);
    a.download = `sportmark_${homeLabel}_${awayLabel}_${date}.mp4`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Revoke after 30 s, not immediately. a.click() triggers the download
    // but the browser's download manager picks up the URL asynchronously.
    // Revoking too early (before the download starts reading the blob) would
    // make the download fail. 30 s is generous enough for any browser to start.
    setTimeout(() => URL.revokeObjectURL(url), 30_000);

    setProgress(100, `✓ Exported — ${wcFmtSize(outBuffer.byteLength)}`,
      `${framesEncoded} frames · ${exportClips.length} clip${exportClips.length !== 1 ? 's' : ''}`);
    const cancelBtn = $('exp-cancel-btn');
    if (cancelBtn) { cancelBtn.textContent = 'Done'; cancelBtn.onclick = () => openExport(); }
    $('exp-bar').style.background = 'var(--serve)';
    toast('Export complete ✓');

  } catch (err) {
    console.error('[WC] export failed —', err.name, err.message);
    console.error('[WC] stack:', err.stack);
    const lbl = $('exp-status');
    if (lbl) { lbl.style.color = 'var(--danger)'; lbl.textContent = '⚠ ' + err.message; }
    const cancelBtn = $('exp-cancel-btn');
    if (cancelBtn) { cancelBtn.textContent = 'Back'; cancelBtn.onclick = () => openExport(); }
  }
}

function cancelExportFn() {
  cancelExport = true;
  openExport();
  toast('Export cancelled');
}

// ════════════════════════════════════════════════════
//  MEDIARECORDER EXPORT
// ════════════════════════════════════════════════════
async function doMediaRecorderExport() {
  if (!videoFile) { toast('Load a video first'); return; }

  const exportClips = clips.filter(c => c.start !== null && c.end !== null && c.end > c.start);
  if (!exportClips.length) { toast('No complete clips to export'); return; }
  if (!('MediaRecorder' in window)) { toast('MediaRecorder not supported'); return; }

  cancelExport = false;

  $('export-body').innerHTML = `<div class="export-body">
    <div class="exp-progress">
      <div class="exp-status" id="exp-status">Initializing…</div>
      <div class="exp-bar-wrap"><div class="exp-bar" id="exp-bar"></div></div>
      <div class="exp-meta-txt" id="exp-meta"></div>
      <div class="exp-note" id="exp-note">Keep this tab visible — switching away will freeze the output</div>
      <button class="exp-cancel" id="exp-cancel-btn" onclick="cancelExportFn()">Cancel</button>
    </div>
  </div>`;

  const setProgress = (pct, status, meta = '') => {
    const bar = $('exp-bar'), lbl = $('exp-status'), met = $('exp-meta');
    if (bar) bar.style.width = Math.max(0, pct) + '%';
    if (lbl) lbl.textContent = status;
    if (met) met.textContent = meta;
  };

  const homeLabel = $('inp-home').value || 'Home';
  const awayLabel = $('inp-away').value || 'Away';

  const onVisibilityChange = () => {
    const note = $('exp-note');
    if (!note) return;
    if (document.hidden) {
      note.textContent = 'Tab is hidden — canvas draw paused, come back to resume';
      note.classList.add('warn');
    } else {
      note.textContent = 'Keep this tab visible — switching away will freeze the output';
      note.classList.remove('warn');
    }
  };
  document.addEventListener('visibilitychange', onVisibilityChange);

  const vid = document.createElement('video');
  vid.src = URL.createObjectURL(videoFile);
  vid.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
  document.body.appendChild(vid);

  try {
    setProgress(3, 'Loading video…');
    await new Promise((res, rej) => {
      vid.onloadedmetadata = res;
      vid.onerror = () => rej(new Error('Failed to load video'));
    });

    const width = vid.videoWidth;
    const height = vid.videoHeight;

    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');

    const fps = 30;
    const canvasStream = canvas.captureStream(fps);

    // Attempt to add audio track from the video element
    try {
      const vidStream = vid.captureStream ? vid.captureStream() : null;
      if (vidStream) {
        for (const at of vidStream.getAudioTracks()) canvasStream.addTrack(at);
      }
    } catch (e) {
      console.warn('Audio capture unavailable:', e);
    }

    const mimeTypes = [
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm',
    ];
    const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
    const bitrate = getExportBitrate(width, height, fps);
    const recorder = new MediaRecorder(canvasStream, {
      mimeType,
      videoBitsPerSecond: bitrate,
    });

    // Use requestVideoFrameCallback when available — it fires once per decoded
    // video frame instead of once per screen refresh, eliminating duplicate/skipped frames.
    const useRVFC = 'requestVideoFrameCallback' in HTMLVideoElement.prototype;

    const chunks = [];
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };

    const sortedClips = [...exportClips].sort((a, b) => a.start - b.start);
    const totalDuration = sortedClips.reduce((s, c) => s + (c.end - c.start), 0);
    let processedDuration = 0;

    const bitrateLabel = bitrate >= 1_000_000 ? (bitrate / 1_000_000).toFixed(0) + ' Mbps' : (bitrate / 1000).toFixed(0) + ' kbps';
    setProgress(8, 'Starting recorder…', `${sortedClips.length} clip${sortedClips.length !== 1 ? 's' : ''} · ${bitrateLabel} · ${useRVFC ? 'rVFC' : 'rAF'}`);

    // Start paused — we resume only once the pre-roll has cleared for each clip.
    recorder.start(200);
    recorder.pause();

    const PREROLL = 0.4; // seconds of decoder warm-up before each clip starts recording

    for (let ci = 0; ci < sortedClips.length; ci++) {
      if (cancelExport) break;
      const clip = sortedClips[ci];

      setProgress(
        10 + Math.round((processedDuration / totalDuration) * 83),
        `Recording clip ${ci + 1} / ${sortedClips.length}`,
        `${fmt(clip.start)} – ${fmt(clip.end)}`
      );

      // Seek to pre-roll position so the decoder reaches steady-state before we
      // start capturing. This eliminates the burst-decode choppiness on clip start.
      vid.currentTime = Math.max(0, clip.start - PREROLL);
      await new Promise(res => { vid.onseeked = () => { vid.onseeked = null; res(); }; });
      if (cancelExport) break;

      // Draw the seek frame so the canvas isn't stale when playback begins
      ctx.drawImage(vid, 0, 0, width, height);

      let stopDrawing = false;
      let recordingResumed = false;

      // Resume the recorder exactly when we reach clip.start — by then the
      // decoder has already been running for PREROLL seconds in steady state.
      const maybeResume = () => {
        if (!recordingResumed && vid.currentTime >= clip.start - 0.02) {
          recorder.resume();
          recordingResumed = true;
        }
      };

      if (useRVFC) {
        const drawFrame = () => {
          if (stopDrawing || cancelExport) return;
          ctx.drawImage(vid, 0, 0, width, height);
          const { h, a } = wcScoreAt(vid.currentTime);
          wcDrawScoreboard(ctx, width, height, homeLabel, awayLabel, h, a);
          maybeResume();
          vid.requestVideoFrameCallback(drawFrame);
        };
        vid.requestVideoFrameCallback(drawFrame);
      } else {
        const drawLoop = () => {
          if (stopDrawing || cancelExport) return;
          ctx.drawImage(vid, 0, 0, width, height);
          const { h, a } = wcScoreAt(vid.currentTime);
          wcDrawScoreboard(ctx, width, height, homeLabel, awayLabel, h, a);
          maybeResume();
          requestAnimationFrame(drawLoop);
        };
        requestAnimationFrame(drawLoop);
      }

      vid.play();
      await new Promise(res => {
        const onTime = () => {
          maybeResume(); // belt-and-suspenders if rVFC/rAF hasn't fired yet
          if (vid.currentTime >= clip.end - 0.04 || cancelExport) {
            vid.removeEventListener('timeupdate', onTime);
            vid.removeEventListener('ended', onEnd);
            vid.pause();
            stopDrawing = true;
            res();
          }
        };
        const onEnd = () => {
          vid.removeEventListener('ended', onEnd);
          vid.removeEventListener('timeupdate', onTime);
          stopDrawing = true;
          res();
        };
        vid.addEventListener('timeupdate', onTime);
        vid.addEventListener('ended', onEnd);
      });

      recorder.pause();
      processedDuration += (clip.end - clip.start);
    }

    setProgress(94, 'Finalizing…');
    await new Promise(res => {
      recorder.onstop = res;
      // resume before stop so the recorder isn't stuck in paused state
      if (recorder.state === 'paused') recorder.resume();
      recorder.stop();
    });

    URL.revokeObjectURL(vid.src);
    document.body.removeChild(vid);

    if (cancelExport) return;

    const blob = new Blob(chunks, { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const base = (videoFile.name || 'export').replace(/\.[^.]+$/, '');
    a.download = `${base}_highlights.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 30_000);

    document.removeEventListener('visibilitychange', onVisibilityChange);

    setProgress(100, `✓ Exported — ${wcFmtSize(blob.size)}`,
      `${sortedClips.length} clip${sortedClips.length !== 1 ? 's' : ''} · WebM`);
    const cancelBtn = $('exp-cancel-btn');
    if (cancelBtn) { cancelBtn.textContent = 'Done'; cancelBtn.onclick = () => openExport(); }
    $('exp-bar').style.background = 'var(--serve)';
    const note = $('exp-note');
    if (note) note.style.display = 'none';
    toast('Export complete ✓');

  } catch (err) {
    document.removeEventListener('visibilitychange', onVisibilityChange);
    try { URL.revokeObjectURL(vid.src); document.body.removeChild(vid); } catch (_) {}
    console.error('MediaRecorder export error:', err);
    const lbl = $('exp-status');
    if (lbl) { lbl.style.color = 'var(--danger)'; lbl.textContent = '⚠ ' + err.message; }
    const cancelBtn = $('exp-cancel-btn');
    if (cancelBtn) { cancelBtn.textContent = 'Back'; cancelBtn.onclick = () => openExport(); }
  }
}

// ── Helpers ──────────────────────────────────────────

function wcYield() { return new Promise(r => setTimeout(r, 0)); }

function wcFmtSize(bytes) {
  return bytes > 1_073_741_824
    ? (bytes / 1_073_741_824).toFixed(1) + ' GB'
    : (bytes / 1_048_576).toFixed(0) + ' MB';
}

function wcClampBitrate(w, h, fps) {
  return Math.min(20_000_000, Math.max(2_000_000, Math.round(w * h * fps * 0.05)));
}

function wcScoreAt(tSec) {
  const h = clips.filter(c => c.end !== null && c.end <= tSec && c.type === 'home_point').length;
  const a = clips.filter(c => c.end !== null && c.end <= tSec && c.type === 'away_point').length;
  return { h, a };
}

function wcDrawScoreboard(ctx, w, h, homeTeam, awayTeam, homeScore, awayScore) {
  const barH = Math.max(30, Math.round(h * 0.065));
  const y = h - barH;
  const pad = Math.round(w * 0.022);
  const fontSize = Math.round(barH * 0.56);

  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, y, w, barH);

  ctx.font = `800 ${fontSize}px "Arial Narrow", Arial, sans-serif`;
  ctx.textBaseline = 'middle';
  const midY = y + barH / 2;

  ctx.fillStyle = '#7eb3ff';
  ctx.textAlign = 'left';
  ctx.fillText(`${homeTeam.toUpperCase()}  ${homeScore}`, pad, midY);

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'center';
  ctx.fillText('·', w / 2, midY);

  ctx.fillStyle = '#ff8a80';
  ctx.textAlign = 'right';
  ctx.fillText(`${awayScore}  ${awayTeam.toUpperCase()}`, w - pad, midY);
}

function wcGetSamplesForClip(allSamples, clip, timescale) {
  // All boundary decisions use DTS — samples are in DTS order and DTS is
  // monotonically increasing. CTS can jump backwards with B-frames, which
  // caused the previous version to cut the GOP short and hang on flush().
  let prerollIdx = -1;
  for (let i = 0; i < allSamples.length; i++) {
    const t = allSamples[i].dts / (allSamples[i].timescale || timescale);
    if (t > clip.start) break;
    if (allSamples[i].is_sync) prerollIdx = i;
  }
  if (prerollIdx === -1) {
    prerollIdx = allSamples.findIndex(s => s.is_sync);
    if (prerollIdx === -1) throw new Error('No keyframes found in video track');
  }

  const allSamplesForClip = [];
  const frameSamples = [];
  for (let i = prerollIdx; i < allSamples.length; i++) {
    const s = allSamples[i];
    const ts = s.timescale || timescale;
    const dtsSec = s.dts / ts;
    const ctsSec = s.cts / ts;
    // Use DTS + 1 s margin for the end boundary so full GOPs are captured.
    // CTS could be ahead of DTS by up to ~1 s with B-frames at typical settings.
    if (dtsSec > clip.end + 1.0) break;
    allSamplesForClip.push(s);
    if (ctsSec >= clip.start - 0.002) frameSamples.push(s);
  }

  return { clip, allSamples: allSamplesForClip, frameSamples };
}

async function wcParseMp4(arrayBuffer) {
  return new Promise((resolve, reject) => {
    const mp4file = MP4Box.createFile();
    const result = { videoTrack: null, audioTrack: null, videoSamples: [], audioSamples: [], mp4file };

    mp4file.onReady = info => {
      result.videoTrack = info.videoTracks[0] || null;
      result.audioTrack = info.audioTracks[0] || null;
      if (result.videoTrack)
        mp4file.setExtractionOptions(result.videoTrack.id, null, { nbSamples: Infinity });
      if (result.audioTrack)
        mp4file.setExtractionOptions(result.audioTrack.id, null, { nbSamples: Infinity });
      mp4file.start();
    };

    mp4file.onSamples = (id, _ref, samples) => {
      if (result.videoTrack && id === result.videoTrack.id)
        result.videoSamples.push(...samples);
      else if (result.audioTrack && id === result.audioTrack.id)
        result.audioSamples.push(...samples);
    };

    mp4file.onError = reject;

    const buf = arrayBuffer;
    buf.fileStart = 0;
    mp4file.appendBuffer(buf);
    mp4file.flush();
    setTimeout(() => resolve(result), 0);
  });
}

function wcBuildDecoderConfig(videoTrack, mp4file) {
  const config = {
    codec: videoTrack.codec,
    codedWidth:  videoTrack.video.width,
    codedHeight: videoTrack.video.height,
    hardwareAcceleration: 'prefer-hardware',
  };
  try {
    const trak = mp4file.getTrackById(videoTrack.id);
    const entry = trak.mdia.minf.stbl.stsd.entries[0];
    if (entry.avcC) {
      // H.264/AVC: codec parameters live in the avcC box as SPS + PPS NAL units.
      // MP4Box.DataStream is not exposed in the browser UMD build, so we manually
      // serialize the AVCDecoderConfigurationRecord bytes ourselves.
      config.description = wcSerializeAvcC(entry.avcC);
    } else if (entry.hvcC) {
      // H.265/HEVC: codec parameters live in the hvcC box as VPS + SPS + PPS NAL
      // unit arrays. Android phones often record in HEVC (it's roughly 40% smaller
      // than H.264 at the same quality), so this path handles the common case of
      // phone footage that fails with avcC-only code.
      // The output of the overall pipeline is still H.264 (the VideoEncoder is
      // always configured with an avc1 codec), so we're decoding HEVC → re-encoding
      // as H.264, which Chrome/Android supports via hardware HEVC decode.
      config.description = wcSerializeHvcC(entry.hvcC);
    }
  } catch (e) {
    console.error('wcBuildDecoderConfig:', e);
  }
  return config;
}

function wcSerializeAvcC(box) {
  const spsList = box.SPS || [];
  const ppsList = box.PPS || [];

  let size = 6 + 1; // 5 config bytes + 1 numSPS + 1 numPPS
  for (const s of spsList) size += 2 + s.nalu.byteLength;
  for (const p of ppsList) size += 2 + p.nalu.byteLength;

  const buf = new Uint8Array(size);
  const view = new DataView(buf.buffer);
  let o = 0;

  buf[o++] = box.configurationVersion || 1;
  buf[o++] = box.AVCProfileIndication;
  buf[o++] = box.profile_compatibility;
  buf[o++] = box.AVCLevelIndication;
  buf[o++] = (box.lengthSizeMinusOne & 0x3) | 0xfc; // upper 6 bits reserved = 1
  buf[o++] = (spsList.length & 0x1f) | 0xe0;         // upper 3 bits reserved = 1
  for (const s of spsList) {
    view.setUint16(o, s.nalu.byteLength, false); o += 2; // big-endian
    buf.set(s.nalu, o); o += s.nalu.byteLength;
  }
  buf[o++] = ppsList.length;
  for (const p of ppsList) {
    view.setUint16(o, p.nalu.byteLength, false); o += 2;
    buf.set(p.nalu, o); o += p.nalu.byteLength;
  }
  return buf;
}

function wcSerializeHvcC(box) {
  // Serialize HEVCDecoderConfigurationRecord (ISO 14496-15, Section 8.3.3.1).
  // The structure is analogous to wcSerializeAvcC but for H.265/HEVC, where the
  // parameter sets come in three flavours stored as typed NAL unit arrays:
  //   VPS (Video Parameter Set)  — NAL unit type 32
  //   SPS (Sequence Parameter Set) — NAL unit type 33
  //   PPS (Picture Parameter Set) — NAL unit type 34
  // MP4Box parses the hvcC box and exposes these as box.NaluArrays, a list of
  // { completeness, nal_unit_type, units: [{ data: Uint8Array }] }.
  const naluArrays = box.NaluArrays || [];

  // Pre-compute the total byte length of the output buffer.
  // Fixed header = 23 bytes (see below for field breakdown) + 1 byte numOfArrays.
  let size = 23 + 1;
  for (const arr of naluArrays) {
    size += 1 + 2; // 1 byte (completeness+type) + 2 bytes (numNalus count)
    for (const unit of arr.units) {
      size += 2 + unit.data.byteLength; // 2-byte length prefix + NAL unit payload
    }
  }

  const buf  = new Uint8Array(size);
  const view = new DataView(buf.buffer);
  let o = 0;

  // ── 23-byte fixed header ────────────────────────────────────────────────────
  buf[o++] = box.configurationVersion || 1;

  // Byte 1: general_profile_space (2 bits) | general_tier_flag (1 bit) | general_profile_idc (5 bits)
  buf[o++] = ((box.general_profile_space & 0x3) << 6) |
             ((box.general_tier_flag     & 0x1) << 5) |
              (box.general_profile_idc   & 0x1f);

  // Bytes 2–5: general_profile_compatibility_flags (32 bits, big-endian)
  view.setUint32(o, box.general_profile_compatibility_flags || 0, false); o += 4;

  // Bytes 6–11: general_constraint_indicator_flags (48 bits).
  // MP4Box reads these as a Uint8Array of 6 bytes; copy them directly.
  const gcif = box.general_constraint_indicator_flags;
  if (gcif && gcif.length === 6) buf.set(gcif, o);
  o += 6;

  buf[o++] = box.general_level_idc || 0;

  // Bytes 13–14: reserved (4 bits = 0xF) | min_spatial_segmentation_idc (12 bits)
  view.setUint16(o, 0xf000 | (box.min_spatial_segmentation_idc & 0x0fff), false); o += 2;

  // Bytes 15–19: single-byte fields, each with reserved high bits set to 1.
  buf[o++] = 0xfc | (box.parallelismType       & 0x3);
  buf[o++] = 0xfc | (box.chroma_format_idc     & 0x3);
  buf[o++] = 0xf8 | (box.bit_depth_luma_minus8   & 0x7);
  buf[o++] = 0xf8 | (box.bit_depth_chroma_minus8 & 0x7);

  // Bytes 20–21: avgFrameRate (16 bits, big-endian)
  view.setUint16(o, box.avgFrameRate || 0, false); o += 2;

  // Byte 22: constantFrameRate (2) | numTemporalLayers (3) | temporalIdNested (1) | lengthSizeMinusOne (2)
  buf[o++] = ((box.constantFrameRate  & 0x3) << 6) |
             ((box.numTemporalLayers  & 0x7) << 3) |
             ((box.temporalIdNested   & 0x1) << 2) |
              (box.lengthSizeMinusOne & 0x3);

  // ── NAL unit arrays ─────────────────────────────────────────────────────────
  buf[o++] = naluArrays.length; // numOfArrays
  for (const arr of naluArrays) {
    // Byte: array_completeness (1 bit) | reserved 0 (1 bit) | NAL_unit_type (6 bits)
    buf[o++] = ((arr.completeness & 0x1) << 7) | (arr.nal_unit_type & 0x3f);
    view.setUint16(o, arr.units.length, false); o += 2;
    for (const unit of arr.units) {
      const data = unit.data instanceof Uint8Array
        ? unit.data
        : new Uint8Array(unit.data.buffer || unit.data);
      view.setUint16(o, data.byteLength, false); o += 2;
      buf.set(data, o); o += data.byteLength;
    }
  }

  return buf;
}

function wcPickH264Codec(width, height, fps) {
  // H.264 defines levels by the maximum macroblocks-per-second (MBs/sec) a
  // decoder/encoder must handle, where each macroblock covers 16×16 pixels.
  // Choosing a level lower than the video requires causes the encoder to
  // reject or corrupt frames silently.
  //   Level 4.0 (0x28): ≤ 245 760 MBs/sec — 1920×1080 @ 30 fps
  //   Level 5.0 (0x32): ≤ 589 824 MBs/sec — ~2560×1440 @ 30 fps
  //   Level 5.1 (0x33): ≤ 983 040 MBs/sec — 3840×2160 @ 30 fps (4K)
  const mbsPerSec = Math.ceil(width / 16) * Math.ceil(height / 16) * fps;
  if (mbsPerSec > 589_824) return 'avc1.640033'; // Level 5.1 — 4K
  if (mbsPerSec > 245_760) return 'avc1.640032'; // Level 5.0 — 1440p or 1080p60
  return 'avc1.640028';                           // Level 4.0 — 1080p30 and below
}

updateUndoRedo();
